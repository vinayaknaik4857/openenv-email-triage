id: openenv-email-triage
name: OpenEnv Email Triage
version: "1.1.0"
description: Deterministic customer-support email triage benchmark with real-world queueing, priority, SLA, and response drafting decisions.
entry_point: env.environment:CustomerSupportEmailTriageEnv

models:
  action: env.models:TriageAction
  observation: env.models:Observation
  state: env.models:EnvState
  step_result: env.models:StepResult

tasks:
  - id: triage-easy-001
    difficulty: easy
    description: Duplicate billing charge requiring refund triage.
  - id: triage-medium-001
    difficulty: medium
    description: Premium-customer SSO outage affecting multiple users.
  - id: triage-hard-001
    difficulty: hard
    description: Enterprise access-governance escalation before compliance audit.

reward_range:
  min: 0.0
  max: 1.0

capabilities:
  reset: true
  step: true
  state: true

deployment:
  type: docker
  healthcheck_path: /
  reset_path: /reset
  step_path: /step
  state_path: /state

tags:
  - openenv
  - email-triage
  - customer-support
  - huggingface-space

license: MIT
